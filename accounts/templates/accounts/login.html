{% extends "base.html" %}

{% block title %}登入 - 社群網站{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-md px-0 sm:px-0">
  <div class="rounded-xl bg-white p-5 shadow sm:p-6">
    <h1 class="mb-5 text-lg font-semibold sm:text-xl">登入</h1>
        <form method="post" action="{% url 'accounts:login' %}" data-show-loading-on-submit>
          {% csrf_token %}
          {% if form.non_field_errors %}
          <div class="mb-4 rounded-lg bg-rose-50 px-3 py-2 text-sm text-rose-600">
            {{ form.non_field_errors.0 }}
          </div>
          {% endif %}
          <div class="mb-4">
            <label for="id_username" class="mb-1 block text-sm font-medium text-slate-600">帳號或 Email</label>
            <input type="text" name="username" id="id_username" value="{{ form.username.value|default:'' }}" class="min-h-11 w-full rounded-lg border border-slate-300 px-3 py-2 text-base outline-none ring-sky-200 focus:ring sm:text-sm" required autofocus autocomplete="username">
          </div>
          <div class="mb-5">
            <label for="id_password" class="mb-1 block text-sm font-medium text-slate-600">密碼</label>
            <input type="password" name="password" id="id_password" class="min-h-11 w-full rounded-lg border border-slate-300 px-3 py-2 text-base outline-none ring-sky-200 focus:ring sm:text-sm" required autocomplete="current-password">
          </div>
          {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
          {% endif %}
          <button type="submit" class="min-h-11 w-full rounded-lg bg-sky-400 px-4 py-2.5 text-base font-medium text-white hover:bg-sky-600 sm:text-sm">登入</button>
        </form>
        <p class="mt-4 text-center text-sm text-slate-500">
          還沒有帳號？<a class="font-medium text-sky-600 hover:underline" href="{% url 'accounts:register' %}">註冊</a>
        </p>
  </div>
</div>
{% endblock %}
