{% extends "base.html" %}

{% block title %}登入 - 社群網站{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body">
        <h5 class="card-title mb-4">登入</h5>
        <form method="post" action="{% url 'accounts:login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">帳號</label>
            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">密碼</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">登入</button>
        </form>
        <p class="mt-3 mb-0 text-center small text-muted">
          還沒有帳號？<a href="{% url 'accounts:register' %}">註冊</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
