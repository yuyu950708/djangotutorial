{% extends "base.html" %}

{% block title %}編輯檔案 - 社群網站{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-2xl">
  <div class="rounded-xl bg-white p-5 shadow sm:p-6">
    <h1 class="mb-5 text-lg font-semibold sm:text-xl">編輯個人檔案</h1>
        <form method="post" action="{% url 'accounts:profile_edit' %}" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-4">
            <label for="id_bio" class="mb-1 block text-sm font-medium text-slate-600">簡介</label>
            <textarea name="bio" id="id_bio" class="min-h-[6rem] w-full rounded-lg border border-slate-300 px-3 py-2 text-base outline-none ring-sky-200 focus:ring sm:text-sm" rows="3">{{ form.bio.value|default:'' }}</textarea>
          </div>
          <div class="mb-4">
            <label for="id_dietary_preference" class="mb-1 block text-sm font-medium text-slate-600">體質紀錄</label>
            <input type="text" name="dietary_preference" id="id_dietary_preference" class="min-h-11 w-full rounded-lg border border-slate-300 px-3 py-2 text-base outline-none ring-sky-200 focus:ring sm:text-sm" value="{{ form.dietary_preference.value|default:'' }}" placeholder="例如：少油、清淡、無辣、低醣">
          </div>
          <div class="mb-6">
            <label for="id_avatar" class="mb-1 block text-sm font-medium text-slate-600">頭像</label>
            <input type="file" name="avatar" id="id_avatar" class="block w-full min-h-11 text-base text-slate-600 file:mr-4 file:rounded-lg file:border-0 file:bg-slate-100 file:px-4 file:py-2 file:text-sm file:text-slate-700 hover:file:bg-slate-200 sm:text-sm" accept="image/*">
          </div>
          <div class="flex flex-col gap-2 sm:flex-row sm:gap-3">
            <button type="submit" class="min-h-11 w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-medium text-white hover:bg-indigo-700 sm:w-auto">儲存</button>
            <a href="{% url 'accounts:profile_detail' user.username %}" class="flex min-h-11 w-full items-center justify-center rounded-lg border border-slate-300 px-4 py-2.5 text-center font-medium text-slate-700 hover:bg-slate-50 sm:w-auto">取消</a>
          </div>
        </form>
  </div>
</div>
{% endblock %}
