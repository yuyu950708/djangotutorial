  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('eatWhatWheel', () => {
        const el = document.getElementById('wheel-category-items');
        let categories = [];
        if (el && el.textContent) {
          try {
            categories = JSON.parse(el.textContent);
          } catch (e) {
            categories = [];
          }
        }
        const feedListUrl = (document.body.dataset.feedListUrl || '/').replace(/\/?$/, '/');
        return {
          open: false,
          rotation: 0,
          spinning: false,
          categories,
          feedListUrl,
          result: '',
          picked: null,
          browseCategoryUrl(cat) {
            const u = new URL(this.feedListUrl, window.location.origin);
            u.searchParams.set('category', String(cat.id));
            return u.pathname + u.search + u.hash;
          },
          /** 依目前 rotation 反推指針（左側 270°）下的分區；與 conic from -90deg、分區中心角 (i+0.5)*seg-90 一致 */
          segmentIndexUnderPointer() {
            const n = this.categories.length;
            if (!n) return 0;
            const seg = 360 / n;
            const R = ((this.rotation % 360) + 360) % 360;
            const norm = (a) => ((a % 360) + 360) % 360;
            const thetaAtPointer = norm(270 + R);
            const shifted = norm(thetaAtPointer + 90);
            let i = Math.floor(shifted / seg);
            if (i >= n) i = n - 1;
            return i;
          },
          wheelGradient() {
            const n = this.categories.length;
            if (!n) return 'conic-gradient(from -90deg, #94a3b8 0deg 360deg)';
            const seg = 360 / n;
            const colors = ['#f87171', '#fb923c', '#fbbf24', '#a3e635', '#4ade80', '#22d3ee', '#818cf8', '#c084fc'];
            const stops = this.categories.map((_, i) => `${colors[i % colors.length]} ${i * seg}deg ${(i + 1) * seg}deg`).join(', ');
            return `conic-gradient(from -90deg, ${stops})`;
          },
          spin() {
            if (this.spinning || !this.categories.length) return;
            this.spinning = true;
            this.picked = null;
            this.result = '';
            const n = this.categories.length;
            const winner = Math.floor(Math.random() * n);
            const seg = 360 / n;
            const extra = 360 * (5 + Math.floor(Math.random() * 3));
            const currentMod = ((this.rotation % 360) + 360) % 360;
            const POINTER_DEG = 270;
            const segmentCenterDeg = (winner + 0.5) * seg - 90;
            const targetMod = ((segmentCenterDeg - POINTER_DEG) % 360 + 360) % 360;
            let delta = targetMod - currentMod;
            if (delta < 0) delta += 360;
            this.rotation += extra + delta;
            window.setTimeout(() => {
              const idx = this.segmentIndexUnderPointer();
              const chosen = this.categories[idx];
              this.picked = chosen;
              this.result = `結果：「${chosen.name}」`;
              this.spinning = false;
            }, 4000);
          },
        };
      });
    });
  </script>

  <script>
    function postInteractBlock(isLikedInit, likeCountInit, isCollectedInit, collectionCountInit) {
      return {
        isLiked: !!isLikedInit,
        count: Number(likeCountInit) || 0,
        isCollected: !!isCollectedInit,
        collectionCount: Number(collectionCountInit) || 0,
        showMsg: false,
        msgText: "",
        hideTimer: null,
        submittingLike: false,
        submittingCollect: false,
        bumpMsg(text) {
          this.msgText = text;
          this.showMsg = true;
          if (this.hideTimer) clearTimeout(this.hideTimer);
          this.hideTimer = setTimeout(() => {
            this.showMsg = false;
          }, 2000);
        },
        async submitLike(event) {
          event.preventDefault();
          if (this.submittingLike) return;
          this.submittingLike = true;
          const form = event.currentTarget;
          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: {
                "X-Requested-With": "XMLHttpRequest",
                Accept: "application/json",
              },
            });
            if (!response.ok) throw new Error("bad");
            const data = await response.json();
            this.isLiked = !!data.is_liked;
            this.count = Number(data.like_count) || 0;
            this.bumpMsg(this.isLiked ? "已按讚" : "已取消按讚");
          } catch (e) {
            this.bumpMsg("操作失敗，請稍後再試");
          } finally {
            this.submittingLike = false;
          }
        },
        async submitCollect(event) {
          event.preventDefault();
          if (this.submittingCollect) return;
          this.submittingCollect = true;
          const form = event.currentTarget;
          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: {
                "X-Requested-With": "XMLHttpRequest",
                Accept: "application/json",
              },
            });
            if (!response.ok) throw new Error("bad");
            const data = await response.json();
            this.isCollected = !!data.is_collected;
            this.collectionCount = Number(data.collection_count) || 0;
            this.bumpMsg(this.isCollected ? "已收藏" : "已取消收藏");
          } catch (e) {
            this.bumpMsg("操作失敗，請稍後再試");
          } finally {
            this.submittingCollect = false;
          }
        },
      };
    }

    function commentLikeBlock(isLikedInit, countInit) {
      return {
        isLiked: !!isLikedInit,
        count: Number(countInit) || 0,
        showMsg: false,
        msgText: "",
        hideTimer: null,
        submitting: false,
        bumpMsg(text) {
          this.msgText = text;
          this.showMsg = true;
          if (this.hideTimer) clearTimeout(this.hideTimer);
          this.hideTimer = setTimeout(() => {
            this.showMsg = false;
          }, 2000);
        },
        async submitCommentLike(event) {
          event.preventDefault();
          if (this.submitting) return;
          this.submitting = true;
          const form = event.currentTarget;
          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: {
                "X-Requested-With": "XMLHttpRequest",
                Accept: "application/json",
              },
            });
            if (!response.ok) throw new Error("bad");
            const data = await response.json();
            this.isLiked = !!data.is_liked;
            this.count = Number(data.like_count) || 0;
            this.bumpMsg(this.isLiked ? "已按讚" : "已取消按讚");
          } catch (e) {
            this.bumpMsg("操作失敗，請稍後再試");
          } finally {
            this.submitting = false;
          }
        },
      };
    }

    function initCommentCreateForms() {
      function getDirectReplyToggle(commentEl) {
        if (!commentEl) return null;
        for (const child of Array.from(commentEl.children || [])) {
          if (child && child.dataset && child.dataset.replyToggle !== undefined) {
            return child;
          }
        }
        return null;
      }

      function getAlpineState(el) {
        if (!el) return null;
        if (el.__x && el.__x.$data) return el.__x.$data;
        if (Array.isArray(el._x_dataStack) && el._x_dataStack.length) {
          return el._x_dataStack[0] || null;
        }
        return null;
      }

      function openAndBumpReplyCounts(commentEl) {
        let cursor = commentEl;
        while (cursor) {
          const toggle = getDirectReplyToggle(cursor);
          const state = getAlpineState(toggle);
          if (state) {
            state.replyCount = Number(state.replyCount || 0) + 1;
            state.showReplies = true;
          }
          const parentChildrenBox = cursor.closest("[data-comment-children]");
          if (!parentChildrenBox) break;
          const parentId = parentChildrenBox.getAttribute("data-comment-children");
          cursor = parentId ? document.querySelector(`[data-comment-id="${parentId}"]`) : null;
        }
      }

      document.querySelectorAll(".js-comment-create-form").forEach((form) => {
        if (form.dataset.ajaxBound === "1") return;
        form.dataset.ajaxBound = "1";
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const submitBtn = form.querySelector('button[type="submit"]');
          if (submitBtn && submitBtn.disabled) return;
          if (submitBtn) submitBtn.disabled = true;
          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: {
                "X-Requested-With": "XMLHttpRequest",
                Accept: "application/json",
              },
            });
            let data = {};
            try {
              data = await response.json();
            } catch (parseErr) {
              data = {};
            }
            if (!response.ok || data.ok !== true) {
              const err = data.error || "送出失敗";
              let tip = form.querySelector(".js-comment-form-tip");
              if (!tip) {
                tip = document.createElement("p");
                tip.className = "js-comment-form-tip mt-1 text-xs text-rose-600";
                form.appendChild(tip);
              }
              tip.textContent = err;
              setTimeout(() => {
                tip.textContent = "";
              }, 3000);
              return;
            }
            const article = form.closest("[data-post-article]");
            const list = article ? article.querySelector("[data-post-comments-list]") : null;
            const countEl = article ? article.querySelector("[data-post-comment-count]") : null;

            const tmp = document.createElement("div");
            tmp.innerHTML = data.html;
            const fragment = tmp.firstElementChild;
            if (!fragment) return;

            if (data.parent_id) {
              const parentEl = article && article.querySelector(`[data-comment-id="${data.parent_id}"]`);
              if (parentEl) {
                const childrenBox = parentEl.querySelector(`[data-comment-children="${data.parent_id}"]`);
                if (childrenBox) {
                  childrenBox.classList.remove("hidden");
                  childrenBox.appendChild(fragment);
                  openAndBumpReplyCounts(parentEl);
                  if (window.Alpine && typeof window.Alpine.initTree === "function") {
                    window.Alpine.initTree(fragment);
                  }
                  initCommentCreateForms();
                }
              }
            } else if (list) {
              const emptyPh = list.querySelector("[data-comments-empty-placeholder]");
              if (emptyPh) emptyPh.remove();
              list.appendChild(fragment);
              if (window.Alpine && typeof window.Alpine.initTree === "function") {
                window.Alpine.initTree(fragment);
              }
              initCommentCreateForms();
            }

            if (countEl && typeof data.comment_count === "number") {
              const countValueEl = countEl.querySelector("[data-post-comment-count-value]");
              if (countValueEl) {
                countValueEl.textContent = `${data.comment_count} 留言`;
              } else {
                countEl.textContent = `${data.comment_count} 留言`;
              }
            }
            form.reset();
            const okTip = form.querySelector(".js-comment-form-tip");
            if (okTip) okTip.textContent = "";
            const replyFormWrap = form.closest("[data-reply-form-wrap]");
            const replyFormState = getAlpineState(replyFormWrap);
            if (replyFormState && "showReplyForm" in replyFormState) {
              replyFormState.showReplyForm = false;
            }
          } catch (e) {
            form.submit();
          } finally {
            if (submitBtn) submitBtn.disabled = false;
          }
        });
      });
    }

    function initPostImageGalleries() {
      document.querySelectorAll("article[data-post-article]").forEach((article) => {
        if (article.dataset.galleryReady === "1") return;
        const postBody = article.querySelector(".post-body");
        if (!postBody) return;

        const bodyImages = Array.from(postBody.querySelectorAll("img"));
        const coverImages = Array.from(article.querySelectorAll(".post-cover-image"));
        const allImages = [...bodyImages, ...coverImages].filter(
          (img, idx, arr) => img && !img.closest(".image-gallery") && arr.indexOf(img) === idx
        );
        if (!allImages.length) return;

        const gallery = document.createElement("div");
        gallery.className = "image-gallery mt-3 flex w-full gap-3 overflow-x-auto snap-x snap-mandatory pb-2";

        allImages.forEach((img) => {
          const oldParent = img.parentElement;
          img.className =
            "mx-auto max-h-[300px] w-auto max-w-full rounded-lg object-contain bg-slate-50";
          const slide = document.createElement("div");
          slide.className = "flex min-w-full shrink-0 snap-center items-center justify-center";
          slide.appendChild(img);
          gallery.appendChild(slide);
          if (
            oldParent &&
            oldParent.tagName === "P" &&
            oldParent.querySelectorAll("img").length === 0 &&
            !oldParent.textContent.trim()
          ) {
            oldParent.remove();
          }
        });

        article.querySelectorAll(".post-cover-image").forEach((img) => {
          const wrap = img.parentElement;
          if (
            wrap &&
            wrap !== gallery &&
            (wrap.tagName === "DIV" || wrap.tagName === "P") &&
            wrap.querySelectorAll("img").length === 0 &&
            !wrap.textContent.trim()
          ) {
            wrap.remove();
          }
        });

        postBody.insertAdjacentElement("afterend", gallery);
        article.dataset.galleryReady = "1";
      });
    }

    function initAppleHoverEffects() {
      const cardSelectors = [
        "[data-post-article]",
        ".post-compose-details",
        "#feed-top-snap",
      ];
      const buttonSelectors = [
        "main button",
        "main input[type='submit']",
        "main a.rounded-lg",
        "main a.rounded-xl",
        "#feed-new-posts-btn",
      ];
      document.querySelectorAll(cardSelectors.join(",")).forEach((el) => {
        el.classList.add("apple-hover-card");
      });
      document.querySelectorAll(buttonSelectors.join(",")).forEach((el) => {
        if (el.classList.contains("rounded-full")) return;
        el.classList.add("apple-hover-btn");
      });
    }

    function initScrollReveal() {
      const items = Array.from(document.querySelectorAll("[data-scroll-reveal]"));
      if (!items.length) return;
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        items.forEach((el) => el.classList.add("scroll-revealed"));
        return;
      }
      if (!("IntersectionObserver" in window)) {
        items.forEach((el) => el.classList.add("scroll-revealed"));
        return;
      }

      items.forEach((el, index) => {
        el.classList.add("scroll-reveal-item");
        el.style.transitionDelay = `${Math.min(index * 40, 220)}ms`;
      });

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            entry.target.classList.add("scroll-revealed");
            observer.unobserve(entry.target);
          });
        },
        {
          threshold: 0.14,
          rootMargin: "0px 0px -6% 0px",
        }
      );
      items.forEach((el) => observer.observe(el));
    }

    document.addEventListener("DOMContentLoaded", () => {
      initCommentCreateForms();
      initPostImageGalleries();
      initAppleHoverEffects();
      initScrollReveal();
    });
  </script>

        if (!response.ok) return;
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const incomingFirst = doc.querySelector("[data-post-article][data-post-id]");
        if (!incomingFirst) return;
        const incomingId = Number(incomingFirst.getAttribute("data-post-id") || 0);
        if (incomingId > firstPostId) {
          hasNewPosts = true;
          syncNewPostsBtn();
        }
      } catch (_e) {
        // ignore polling errors
      }
    }

    if (newPostsBtn) {
      function endFeedBackToTopSnap() {
        document.documentElement.classList.remove("feed-back-to-top-snap");
      }

      newPostsBtn.addEventListener("click", () => {
        document.documentElement.classList.add("feed-back-to-top-snap");
        window.scrollTo({ top: 0, behavior: "smooth" });
        if ("onscrollend" in window) {
          window.addEventListener(
            "scrollend",
            () => {
              endFeedBackToTopSnap();
            },
            { once: true }
          );
        } else {
          window.setTimeout(endFeedBackToTopSnap, 700);
        }
        if (hasNewPosts) {
          window.setTimeout(() => {
            window.location.reload();
          }, 450);
        }
      });
      window.addEventListener("scroll", syncNewPostsBtn, { passive: true });
      syncNewPostsBtn();
    }

    if (onFirstPage && firstPostId) {
      window.setInterval(checkNewPosts, 30000);
    }

    const categorySelect = document.getElementById("feed-category");
    const selectedCategoriesBox = document.getElementById("feed-selected-categories-box");
    const selectedCategoriesList = document.getElementById("feed-selected-categories-list");
    const tagSelect = document.getElementById("feed-tag");
    const selectedTagsBox = document.getElementById("feed-selected-tags-box");
    const selectedTagsList = document.getElementById("feed-selected-tags-list");
    if (
      categorySelect &&
      selectedCategoriesBox &&
      selectedCategoriesList &&
      tagSelect &&
      selectedTagsBox &&
      selectedTagsList
    ) {
      function renderSelectedChips(selectEl, boxEl, listEl, chipClass) {
        const selectedOptions = Array.from(selectEl.selectedOptions || []);
        listEl.innerHTML = "";
        if (!selectedOptions.length) {
          boxEl.classList.add("hidden");
          return;
        }
        boxEl.classList.remove("hidden");
        selectedOptions.forEach((opt) => {
          const chip = document.createElement("span");
          chip.className = chipClass;
          chip.textContent = opt.textContent.trim();
          listEl.appendChild(chip);
        });
      }

      function renderSelectedFiltersNow() {
        renderSelectedChips(
          categorySelect,
          selectedCategoriesBox,
          selectedCategoriesList,
          "rounded-full bg-white px-2.5 py-1 text-xs font-medium text-emerald-700 ring-1 ring-emerald-200"
        );
        renderSelectedChips(
          tagSelect,
          selectedTagsBox,
          selectedTagsList,
          "rounded-full bg-white px-2.5 py-1 text-xs font-medium text-sky-700 ring-1 ring-sky-200"
        );
      }

      categorySelect.addEventListener("change", renderSelectedFiltersNow);
      categorySelect.addEventListener("click", renderSelectedFiltersNow);
      categorySelect.addEventListener("keyup", renderSelectedFiltersNow);
      tagSelect.addEventListener("change", renderSelectedFiltersNow);
      tagSelect.addEventListener("click", renderSelectedFiltersNow);
      tagSelect.addEventListener("keyup", renderSelectedFiltersNow);
      renderSelectedFiltersNow();
    }

    const healthModeToggle = document.getElementById("health-mode-toggle");
    const healthCards = document.querySelectorAll("[data-post-article]");
    const storageKey = "feed-health-mode-enabled";
    let isHealthMode = window.localStorage.getItem(storageKey) === "1";

    function paintHealthMode() {
      if (!healthModeToggle) return;
      healthModeToggle.classList.toggle("health-mode-enabled", isHealthMode);
      healthModeToggle.setAttribute("aria-pressed", isHealthMode ? "true" : "false");
      healthCards.forEach((card) => {
        card.classList.toggle("health-mode-on", isHealthMode);
      });
    }

    if (healthModeToggle) {
      healthModeToggle.addEventListener("click", () => {
        isHealthMode = !isHealthMode;
        window.localStorage.setItem(storageKey, isHealthMode ? "1" : "0");
        paintHealthMode();
      });
      paintHealthMode();
    }

    if (window.initAppleCarousels) {
      window.initAppleCarousels();
      window.addEventListener("load", window.initAppleCarousels);
    }
  });
</script>

</body>
</html>
