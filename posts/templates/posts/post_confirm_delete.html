{% extends "base.html" %}

{% block title %}刪除貼文 - 等等吃啥{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-2xl">
  <div class="rounded-xl bg-white p-5 shadow sm:p-6">
    <h1 class="text-lg font-semibold sm:text-xl">確認刪除貼文</h1>
    <p class="mt-2 text-sm text-slate-600">此操作無法復原。你確定要刪除這篇貼文嗎？</p>

    <div class="mt-4 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700">
      <div class="font-semibold">{{ post.title|default:"（無標題）" }}</div>
      <div class="mt-1 text-slate-500">建立時間：{{ post.created_at }}</div>
    </div>

    <form method="post" class="mt-6 flex flex-col gap-2 sm:flex-row sm:gap-3">
      {% csrf_token %}
      <button type="submit" class="min-h-11 w-full rounded-lg bg-rose-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-rose-700 sm:w-auto">確定刪除</button>
      <a href="{% url 'posts:post_detail' post.pk %}" class="flex min-h-11 w-full items-center justify-center rounded-lg border border-slate-300 px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 sm:w-auto">取消</a>
    </form>
  </div>
</div>
{% endblock %}
